<mat-toolbar id="menu-container">
    <mat-toolbar-row id="menu">
        <mat-nav-list>
            <a mat-button *ngFor="let item of items" routerLink="{{item.path}}" color="secondary" class="menu-item">
                <i class="material-icons">
                    {{item.icon}}
                </i><h5>{{item.name}}</h5></a>
        </mat-nav-list> 
    </mat-toolbar-row>
</mat-toolbar>
